name: Update Catalog

on:
  schedule:
    # 5 AM Central Standard Time  = 11:00 UTC
    # 5 AM Central Daylight Time  = 10:00 UTC
    # June–November (CDT) use 10 UTC; December–March (CST) switch to 11 UTC
    - cron: '0 10 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force commit even if catalog unchanged'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh Sleep Number catalog
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run catalog updater
        run: npm run refresh:catalog

      - name: Commit catalog if changed
        run: |
          git config user.name  "Catalog Bot"
          git config user.email "catalog-bot@noreply.github.com"
          git add data/catalog.json
          if git diff --cached --quiet && [ "${{ github.event.inputs.force }}" != "true" ]; then
            echo "No catalog changes — skipping commit."
          else
            git commit -m "chore: daily catalog refresh $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
            git push
            echo "Catalog committed and pushed."
          fi
