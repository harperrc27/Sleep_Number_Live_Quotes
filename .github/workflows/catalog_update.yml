name: Update Catalog

on:
  schedule:
    # Fast updater: 5 AM Central (daylight saving time = UTC-5 → 10:00 UTC)
    - cron: '0 10 * * *'
    # Deep research agent: 6 AM Central (one hour after fast update)
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Which agent to run'
        required: true
        default: 'both'
        type: choice
        options:
          - fast
          - deep
          - both

permissions:
  contents: write

jobs:
  fast-update:
    name: Fast Catalog Update
    # Scheduled: only on the 5 AM cron (10 UTC). Manual: when mode is "fast" or "both".
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 10 * * *') ||
      github.event.inputs.mode == 'fast' ||
      github.event.inputs.mode == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run fast catalog updater
        run: node scripts/update_catalog.mjs

      - name: Commit catalog changes
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json
          git diff --cached --quiet && echo "No catalog changes" || \
            git commit -m "chore: fast catalog update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

  deep-research:
    name: Deep Research Agent
    # Scheduled: only on the 6 AM cron (11 UTC). Manual "both": runs after fast-update.
    # Manual "deep": runs standalone (no fast-update dependency).
    needs: >-
      ${{ (github.event.inputs.mode == 'both') && 'fast-update' || '' }}
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * *') ||
      github.event.inputs.mode == 'deep' ||
      github.event.inputs.mode == 'both'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pull latest so we pick up any changes from fast-update
          ref: ${{ github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run deep research agent (multi-pass)
        run: node scripts/deep_research_agent.mjs

      - name: Commit catalog and research report
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin ${{ github.ref_name }} || true
          git add data/catalog.json data/research-report.json
          git diff --cached --quiet && echo "No changes from deep research" || \
            git commit -m "chore: deep research catalog update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
