name: Daily Catalog Refresh

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 11 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh-catalog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run only at 5 AM Central
        run: |
          hour=$(TZ=America/Chicago date +%H)
          if [ "$hour" != "05" ]; then
            echo "Not 5 AM Central. Exiting."
            exit 0
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh catalog
        run: node scripts/update_catalog.mjs

      - name: Validate catalog schema
        run: node -e "import('./src/quote-engine.mjs').then(m=>{const fs=require('fs');const c=JSON.parse(fs.readFileSync('data/catalog.json','utf8'));m.validateCatalogShape(c);})"

      - name: Commit changed catalog and report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/catalog.json data/refresh-report.json
          if git diff --cached --quiet; then
            echo "No catalog changes detected."
            exit 0
          fi
          git commit -m "chore: refresh public catalog snapshot"
          git push
